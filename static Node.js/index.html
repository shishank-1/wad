<!DOCTYPE html>
<html>
<head>
    <title>Student Portal</title>

    <style>
        body{
            font-family: Arial;
            background-color: #f2f2f2;
            text-align: center;
            margin: 0;
        }

        header{
            background-color: #0077cc;
            color: white;
            padding: 15px;
        }

        .container{
            margin-top: 50px;
        }

        .card{
            background-color: white;
            width: 300px;
            margin: auto;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        button{
            background-color: #0077cc;
            color: white;
            border: none;
            padding: 10px 20px;
            margin-top: 15px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background-color: #005fa3;
        }
    </style>
</head>

<body>

    <header>
        <h1>Student Study Portal</h1>
    </header>

    <div class="container">

        <div class="card">
            <h2>Welcome Students</h2>

            <p>
                This is a simple static website created using
                Node.js and Express.js.
            </p>

            <button>Explore</button>
        </div>

    </div>

</body>
</html>
